    <!-- Auth Check and User Menu Script -->
    <script>
        (function() {
            const user = localStorage.getItem('dreamTravelUser');
            const currentPage = window.location.pathname.split('/').pop();
            const publicPages = ['login.html', 'signup.html'];
            
            if (!user && !publicPages.includes(currentPage)) {
                window.location.href = 'login.html';
                return;
            }
            
            if (user) {
                const userData = JSON.parse(user);
                const userMenu = document.getElementById('userMenu');
                if (userMenu) {
                    userMenu.innerHTML = `
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> ${userData.name || userData.email.split('@')[0]}
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="profile.html"><i class="bi bi-person me-2"></i>Profile</a></li>
                            <li><a class="dropdown-item" href="planner.html"><i class="bi bi-suitcase me-2"></i>My Trips</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                        </ul>
                    `;
                }
            }
        })();
        
        function logout() {
            localStorage.removeItem('dreamTravelUser');
            window.location.href = 'login.html';
        }
    </script>
